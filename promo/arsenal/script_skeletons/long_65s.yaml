# Long-format promo script skeleton (65s).
# Loaded by `arsenal_loader.load_format_template("long")` into a frozen
# `PromoFormatProfile`. See `short_30s.yaml` for field semantics.

mode: long
target_duration_sec: 65
duration_label: "65 second"
description: "Flagship 65s long-form hotel promo: 5 segments, 150-170 words, semantic 2-4s visual beats."

# Per-type personality (P2): the card is the single source of truth
# for these knobs. beat_*_sec bound the visual beat planner's cut
# lengths; pause_cap_ms caps a single authored pause; the POI
# selection floor is base_min + per_extra × (videos_per_poi − 1).
pacing:
  beat_min_sec: 2.0
  beat_max_sec: 4.0
  pause_cap_ms: 3000
assets:
  base_min: 50
  per_extra: 10
segment_count: 5
total_words_min: 150
total_words_max: 170
per_segment_min: 12
per_segment_max: 40
min_clip_pool_size: 14
recommended_clip_pool_size: 18
min_effective_wpm: 90
max_effective_wpm: 160
max_narration_ratio: 0.92

# Per-mode RULES content — fills `$sentence_rule` /
# `$extra_rules_block` in `gemini1_script_v1.md`. LONG widens the
# sentence cap to 15-18 words for vivid specifics, and reinforces a
# 150-word floor as an extra RULES bullet (Sprint 08.5 — Gemini
# under-delivers without an explicit floor).
sentence_rule: "Spoken cadence. Mostly 5-15 words per sentence, occasionally up to 18 when a sentence carries a vivid specific. Fragments welcome."
extra_rules:
  - "Minimum 150 words total — write fuller thoughts, more specific details, don't undershoot. Aim for the 160-word midpoint."

segment_plans:
  - label: HOOK
    approx_words: 31
    min_clips: 3
    max_clips: 4
    guidance: "Open hard with price, superlative, or a sharp contradiction that earns the next 10 seconds."
    preferred_categories: [exterior, aerial, scenic]
  - label: ARRIVAL
    approx_words: 34
    min_clips: 3
    max_clips: 4
    guidance: "Set the environment and first emotional hit. Let the place settle before stacking details."
    preferred_categories: [exterior, lobby, aerial, scenic]
  - label: "LIVE IT"
    approx_words: 36
    min_clips: 3
    max_clips: 4
    guidance: 'Put the viewer in the stay. Use "you". Leave room for the visuals to breathe between moments.'
    preferred_categories: [room, pool, spa, activity]
  - label: HIGHLIGHTS
    approx_words: 34
    min_clips: 3
    max_clips: 4
    guidance: "Specific amenities, rituals, scenery, food, and standout moments. Stay selective, not dense."
    preferred_categories: [pool, food, spa, activity, restaurant, scenic]
  - label: CLOSE
    approx_words: 24
    min_clips: 2
    max_clips: 3
    guidance: "Give the hotel name and one final line that lingers without sounding like an ad."
    preferred_categories: [exterior, aerial, scenic]
