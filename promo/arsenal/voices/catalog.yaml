# Voice catalog. Add a new voice = add a new top-level key.
# Required fields: id, name, gender, age, accent, description, backend.
# Optional: style_prompt (Gemini backend only — directorial instruction
# prepended at TTS time).
#
# Order matters: ``compile_promo._resolve_voice_keys`` reads dict order
# for variant rotation when ``--voice`` is unset. Gemini entries are
# declared FIRST so the default rotation picks Gemini. The Gemini entry
# (Kore + directorial prompt) was locked by Sprint TTS-Migration Phase 1
# voice A/B — decision memo at
# ``workflow/projects/promo-foundation/decisions/2026-04-21-gemini-voice-lock.md``.

kore:
  id: Kore
  name: "Kore (Gemini 3.1 Flash TTS)"
  gender: male
  age: middle-aged
  accent: American
  description: "Warm, confident Gemini voice. Directorial prompt tunes pacing to persona target (~148 WPM)."
  backend: gemini
  style_prompt: "Read at a confident, engaging pace, warm but never sluggish:"

